apiVersion: v1
kind: Namespace
metadata:
  name: headlamp

---

apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp
  namespace: headlamp

---

kind: Service
apiVersion: v1
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp
  namespace: headlamp
spec:
  ports:
    - name: http
      port: 80
      targetPort: 4466
  selector:
    k8s-app: headlamp

---

apiVersion: v1
kind: Secret
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp-token
  namespace: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp
type: kubernetes.io/service-account-token

---

kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps", "secrets", "nodes", "namespaces", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp
subjects:
- kind: ServiceAccount
  name: headlamp
  namespace: headlamp

---

kind: Deployment
apiVersion: apps/v1
metadata:
  labels:
    k8s-app: headlamp
  name: headlamp
  namespace: headlamp
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      k8s-app: headlamp
  template:
    metadata:
      labels:
        k8s-app: headlamp
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: headlamp
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        "kubernetes.io/os": linux
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
      - name: headlamp
        image: ghcr.io/headlamp-k8s/headlamp:v0.43.0
        imagePullPolicy: IfNotPresent
        args:
        - -in-cluster
        - -plugins-dir=/headlamp/plugins
        - -base-url=/headlamp
        ports:
        - containerPort: 4466
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            scheme: HTTP
            path: /headlamp/
            port: 4466
          initialDelaySeconds: 30
          timeoutSeconds: 30
        livenessProbe:
          httpGet:
            scheme: HTTP
            path: /headlamp/
            port: 4466
          initialDelaySeconds: 30
          timeoutSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      volumes:
      - name: tmp-volume
        emptyDir: {}